<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a02021"/>
      <stop offset="100%" style="stop-color:#7a1819"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- House icon -->
  <g transform="translate(256, 270)">
    <!-- Roof -->
    <path d="M-120 0 L0 -100 L120 0 Z" fill="url(#roofGrad)" stroke="#ffffff" stroke-width="4"/>

    <!-- House body -->
    <rect x="-90" y="0" width="180" height="120" fill="#ffffff" rx="4"/>

    <!-- Door -->
    <rect x="-25" y="40" width="50" height="80" fill="#a02021" rx="3"/>
    <circle cx="15" cy="85" r="5" fill="#7a1819"/>

    <!-- Windows -->
    <rect x="-75" y="25" width="35" height="35" fill="#a02021" rx="2"/>
    <rect x="40" y="25" width="35" height="35" fill="#a02021" rx="2"/>

    <!-- Window panes -->
    <line x1="-57.5" y1="25" x2="-57.5" y2="60" stroke="#7a1819" stroke-width="2"/>
    <line x1="-75" y1="42.5" x2="-40" y2="42.5" stroke="#7a1819" stroke-width="2"/>
    <line x1="57.5" y1="25" x2="57.5" y2="60" stroke="#7a1819" stroke-width="2"/>
    <line x1="40" y1="42.5" x2="75" y2="42.5" stroke="#7a1819" stroke-width="2"/>

    <!-- Chimney -->
    <rect x="50" y="-70" width="30" height="50" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Dollar sign overlay -->
  <g transform="translate(380, 140)">
    <circle cx="0" cy="0" r="50" fill="#ffffff" stroke="#a02021" stroke-width="4"/>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#a02021" text-anchor="middle">$</text>
  </g>
</svg>
