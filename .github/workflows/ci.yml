name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scaffolder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  templates:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        template: [electron-gui-app, cli-app]
        os: [ubuntu-latest]
    defaults:
      run:
        working-directory: templates/${{ matrix.template }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: Electron packaging smoke
        if: matrix.template == 'electron-gui-app'
        run: |
          node scripts/download-chrome.js
          CSC_IDENTITY_AUTO_DISCOVERY=false pnpm exec electron-builder --dir
