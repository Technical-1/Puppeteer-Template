name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    name: "Build (${{ matrix.label }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            platform: win
          - os: ubuntu-latest
            label: linux
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build and publish
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload release assets (Windows)
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
      - name: Upload release assets (Linux)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
